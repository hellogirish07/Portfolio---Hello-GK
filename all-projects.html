<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Portfolio - Projects</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/resp.css">
</head>

<body>
    <div class="bg-animation"></div>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo" onclick="back()">Girish Suthar</div>
            <ul id="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#projects">Projects</a></li>
            </ul>
            <div class="mobile-menu" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="hero-title">My Projects</h1>
            <p class="hero-subtitle">Check out my projects! Some even work on the first try!</p>
            <div class="cta-buttons">
                <a href="#projects" class="cta-btn cta-primary">View My Work</a>
            </div>
        </div>
    </section>

    <section id="projects">
        <h2 class="section-title fade-in">My Projects</h2>

        <!-- 🔍 Search & Filter -->
        <section id="search-filter">
            <input type="text" id="search-bar" placeholder="Search Projects...">
        </section>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="react app">React app</button>
            <button class="filter-btn" data-filter="web app">Web app</button>
            <button class="filter-btn" data-filter="game">Games</button>
            <button class="filter-btn" data-filter="animation library">Animation Library</button>
            <button class="filter-btn" data-filter="landing page">Landing Pages</button>
        </div>

        <div class="projects-grid">
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; <span id="footeryear"></span> Girish Suthar. All rights reserved.</p>
        <div class="backToTop">
            <a href="#home">Back to Top ↑</a>
        </div>
    </footer>
    <script src="project.js"></script>
    <script src="script.js"></script>
</body>

</html>
